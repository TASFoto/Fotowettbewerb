<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fotowettbewerb – Lebenswelten Obdachlosigkeit</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 2px 20px rgba(0,0,0,0.1);
    }
    h1 { font-size: 1.4rem; color: #1a1a1a; margin-bottom: 8px; }
    p { color: #666; font-size: 0.95rem; margin-bottom: 28px; line-height: 1.5; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: #333; margin-bottom: 6px; }
    input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      margin-bottom: 20px;
      outline: none;
    }
    input[type="text"]:focus { border-color: #4f46e5; }
    .file-area {
      border: 2px dashed #ddd;
      border-radius: 8px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      margin-bottom: 24px;
      transition: border-color 0.2s;
    }
    .file-area:hover { border-color: #4f46e5; }
    .file-area input { display: none; }
    .file-area .icon { font-size: 2rem; margin-bottom: 8px; }
    .file-area .hint { color: #888; font-size: 0.85rem; }
    .file-name { color: #4f46e5; font-weight: 600; margin-top: 8px; font-size: 0.9rem; }
    button {
      width: 100%;
      padding: 14px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #4338ca; }
    button:disabled { background: #a5b4fc; cursor: not-allowed; }
    .status { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 0.9rem; display: none; }
    .status.success { background: #ecfdf5; color: #065f46; display: block; }
    .status.error { background: #fef2f2; color: #991b1b; display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Fotowettbewerb</h1>
    <p>Lebenswelten Obdachlosigkeit – reiche dein Foto ein. Nach dem Hochladen kann es nicht mehr geloescht werden.</p>

    <label for="name">Dein Name</label>
    <input type="text" id="name" placeholder="Vorname Nachname">

    <label>Fotos auswaehlen</label>
    <div class="file-area" onclick="document.getElementById('file').click()">
      <input type="file" id="file" accept="image/*" multiple onchange="showFile(this)">
      <div class="icon">&#128247;</div>
      <div class="hint">Klicken zum Auswaehlen (JPG, PNG, max. 50 MB, bis zu 10 Fotos)</div>
      <div class="file-name" id="fileName"></div>
    </div>

    <button onclick="uploadFile()" id="btn">Foto einreichen</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    function showFile(input) {
      var files = input.files;
      if (files.length === 1) {
        document.getElementById("fileName").textContent = files[0].name;
      } else if (files.length > 1) {
        document.getElementById("fileName").textContent = files.length + " Fotos ausgewaehlt";
      }
    }

    function uploadFile() {
      var name = document.getElementById("name").value.trim();
      var files = document.getElementById("file").files;
      var btn = document.getElementById("btn");
      var status = document.getElementById("status");

      if (!name) { alert("Bitte deinen Namen eingeben."); return; }
      if (!files.length) { alert("Bitte mindestens ein Foto auswaehlen."); return; }

      btn.disabled = true;
      btn.textContent = "Wird hochgeladen...";
      status.className = "status";

      var formData = new FormData();
      formData.append("name", name);
      for (var i = 0; i < files.length; i++) {
        formData.append("photos", files[i]);
      }

      fetch("/upload", { method: "POST", body: formData })
        .then(function(res) { return res.json(); })
        .then(function(data) {
          if (data.success) {
            status.className = "status success";
            status.textContent = data.count + " Foto(s) erfolgreich eingereicht! Vielen Dank.";
            btn.textContent = "Eingereicht";
          } else {
            throw new Error(data.error || "Fehler beim Hochladen");
          }
        })
        .catch(function(err) {
          status.className = "status error";
          status.textContent = "Fehler: " + err.message;
          btn.disabled = false;
          btn.textContent = "Foto einreichen";
        });
    }
  </script>
</body>
</html>
